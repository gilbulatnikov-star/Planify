<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 575 175">
  <defs>
    <clipPath id="qbound">
      <rect x="14" y="14" width="182" height="132" rx="66"/>
    </clipPath>
  </defs>

  <!-- Q: outer black pill -->
  <rect x="14" y="14" width="182" height="132" rx="66" fill="#0a0a0a"/>

  <!-- Q: inner white hole to form ring -->
  <rect x="44" y="44" width="122" height="72" rx="36" fill="white"/>

  <!-- Q: tail gap cut (white) clipped to Q boundary -->
  <rect x="126" y="88" width="72" height="60" fill="white" clip-path="url(#qbound)"/>

  <!-- Q: inner ear/stub at tail -->
  <rect x="128" y="86" width="15" height="32" rx="7" fill="#0a0a0a"/>

  <!-- Blue teardrop -->
  <ellipse cx="170" cy="158" rx="13" ry="17" fill="#38b6ff" transform="rotate(-8 170 158)"/>

  <!-- LIPY -->
  <text x="215" y="148"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="152"
    fill="#0a0a0a">LIPY</text>
</svg>
