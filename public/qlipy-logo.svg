<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 155" fill="none">
  <defs>
    <clipPath id="qclip">
      <rect x="5" y="5" width="145" height="145" rx="38"/>
    </clipPath>
  </defs>

  <!-- Q outer black rounded square -->
  <rect x="5" y="5" width="145" height="145" rx="38" fill="#0a0a0a"/>

  <!-- Q inner white horizontal pill cutout -->
  <rect x="28" y="32" width="100" height="58" rx="29" fill="white"/>

  <!-- Q tail gap (vertical slot cut into bottom-right of ring) -->
  <rect x="82" y="96" width="38" height="60" fill="white" clip-path="url(#qclip)"/>

  <!-- Blue teardrop at tail -->
  <ellipse cx="103" cy="126" rx="14" ry="19" fill="#38b6ff" transform="rotate(-15 103 126)"/>

  <!-- LIPY wordmark -->
  <text x="163" y="124"
    font-family="'Arial Black', 'Arial Bold', Arial, Helvetica, sans-serif"
    font-weight="900"
    font-size="108"
    fill="#0a0a0a"
    letter-spacing="-2">LIPY</text>
</svg>
