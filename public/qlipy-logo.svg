<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 610 190" fill="none">
  <!-- Q ring: thick horizontal pill ring with gap at lower-right (like real Q tail) -->
  <rect
    x="18" y="18"
    width="170" height="122"
    rx="61"
    fill="none"
    stroke="#0a0a0a"
    stroke-width="28"
    stroke-linecap="round"
    stroke-dasharray="420 58"
    stroke-dashoffset="243"
  />
  <!-- Blue teardrop at Q tail -->
  <ellipse cx="165" cy="162" rx="13" ry="17" fill="#38b6ff" transform="rotate(-8 165 162)"/>
  <!-- LIPY wordmark -->
  <text
    x="220" y="163"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="158"
    fill="#0a0a0a"
  >LIPY</text>
</svg>
